name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version is read from the "packageManager" field in package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Seed databases
        run: pnpm setup
        env:
          AUTH_SECRET: ci-test-secret
          PULSE_ENCRYPTION_KEY: ci-test-encryption-key-32bytes!!

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          AUTH_SECRET: ci-test-secret
          PULSE_ENCRYPTION_KEY: ci-test-encryption-key-32bytes!!
