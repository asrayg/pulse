      <text x="18" y="114">Hooli Cloud</text><rect x="150" y="104" width="232" height="13" rx="3" fill="#3b82f6" opacity="0.8"/>
      <text x="18" y="142">Globex Corp</text><rect x="150" y="132" width="198" height="13" rx="3" fill="#3b82f6" opacity="0.72"/>
      <text x="18" y="170">Initech Group</text><rect x="150" y="160" width="160" height="13" rx="3" fill="#3b82f6" opacity="0.64"/>
      <text x="18" y="198">Vandelay Labs</text><rect x="150" y="188" width="128" height="13" rx="3" fill="#3b82f6" opacity="0.56"/>
